name: YOLO11-Valorant 在线训练

# 触发方式：手动点击运行（也可以加push触发）
on:
  workflow_dispatch:

jobs:
  train:
    runs-on: ubuntu-latest
    steps:
      # 1. 拉取仓库代码
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 拉取完整历史，避免缓存问题

      # 2. 安装Python环境
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"  # 缓存依赖，加速下次运行

      # 3. 安装依赖
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ultralytics opencv-python pillow matplotlib

      # 4. 执行训练脚本
      - name: Run training
        run: |
          python 训练.py

      # 5. 上传训练好的权重和结果
      - name: Upload trained weights and results
        uses: actions/upload-artifact@v4
        with:
          name: YOLO11-Valorant-训练结果
          path: |
            runs/detect/valorant2.0/weights/
            runs/detect/valorant2.0/results.png
            runs/detect/valorant2.0/confusion_matrix.png
